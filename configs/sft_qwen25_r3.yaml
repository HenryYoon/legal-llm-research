model_name: Qwen/Qwen2.5-1.5B-Instruct
output_dir: models/qwen25-1.5b-legal-sft-r3
load_in_4bit: true
lora_r: 16
lora_alpha: 32
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
num_train_epochs: 2
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 2e-4
max_seq_length: 1536
bf16: true
gradient_checkpointing: true
dataset_path: data/sft_r3.jsonl
# R3 notes:
# - dataset 8.5K samples, EN 87.5% / KO 12.5%
# - binary final_answer Yes/No start rate: 100%
# - elements whitelist enforced (no generic English hallucination)
# - batch 4; reduce to 2 if OOM on RTX 3060 12GB
